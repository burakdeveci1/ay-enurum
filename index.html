<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayşenur'un Dünyası ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #fff0f5; /* Lavanta pembesi */
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Esneklik için min-height */
            overflow: hidden;
            color: #ff69b4;
            position: relative;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9); /* Biraz daha az şeffaf */
            padding: 30px; /* Paddingi biraz azalttık resim gelince */
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 105, 180, 0.4);
            border: 3px dashed #ffb6c1; /* Çizgiyi biraz kalınlaştırdık */
            z-index: 10;
            max-width: 380px; /* Biraz daralttık */
            position: relative;
        }

        /* --- Fotoğraf İçin CSS Bölümü --- */
        .photo-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 20px auto; /* Ortala ve alttan boşluk bırak */
            z-index: 5;
        }

        .aysenur-photo {
            width: 100%;
            height: 100%;
            border-radius: 50%; /* Yuvarlak resim */
            object-fit: cover; /* Resmi sığdır, bozma */
            border: 5px solid white; /* Beyaz iç çerçeve */
            box-shadow: 0 5px 15px rgba(255, 182, 193, 0.8); /* Pembe ışıltı */
            transition: transform 0.5s ease-in-out;
        }

        /* Fotoğrafın arkasındaki süslü halka */
        .photo-frame-ring {
            position: absolute;
            top: -10px;
            left: -10px;
            width: 170px;
            height: 170px;
            border-radius: 50%;
            border: 2px solid #ffb6c1;
            opacity: 0.7;
            animation: rotateRing 10s linear infinite;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem; /* Resim gelince biraz küçülttük */
            margin: 10px 0;
            animation: bounce 2s infinite;
        }

        p {
            font-size: 1rem;
            color: #db7093;
            margin: 5px 0;
        }

        .heart {
            color: #ff1493;
            font-size: 40px;
            margin: 10px 0;
        }

        .btn {
            background-color: #ff69b4;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, background-color 0.3s, box-shadow 0.3s;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 1px;
        }

        .btn:hover {
            background-color: #ff1493;
            transform: scale(1.1) rotate(-3deg);
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4);
        }

        /* Arka plan süsleri */
        .floating-heart {
            position: absolute;
            color: #ffb6c1;
            font-size: 22px;
            pointer-events: none;
            animation: float 5s linear infinite;
            z-index: 1;
        }

        /* Animasyonlar */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        @keyframes rotateRing {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Fotoğraf üzerine gelince dönsün */
        .photo-container:hover .aysenur-photo {
            transform: scale(1.05) rotate(5deg);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="photo-container">
            <div class="photo-frame-ring"></div>
            <img src="ösösös.jpg" alt="Dünyanın En Tatlısı Ayşenur" class="aysenur-photo">
        </div>

        <h1>Selam Bebişim! ✨</h1>
        <div class="heart">💖</div>
        <p>Dünyanın en ikonik Ayşenur'u için...</p>
        <p><i>"Senin ışıltın yıldızları kıskandırır aşko!"</i></p>
        <button class="btn" onclick="surprizYap()">Tıkla Bakalım ✨</button>
    </div>

    <script>
        // Arka planda yüzen simgeler (Kalp ve Çiçek karışık)
        const icons = ['🌸', '💖', '✨', '☁️'];
        
        function createFloatingIcon() {
            const icon = document.createElement('div');
            icon.classList.add('floating-heart');
            icon.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            icon.style.left = Math.random() * 100 + 'vw';
            icon.style.animationDuration = Math.random() * 3 + 2 + 's';
            icon.style.opacity = Math.random() * 0.7 + 0.3; // Tam şeffaf olmasınlar
            document.body.appendChild(icon);

            setTimeout(() => {
                icon.remove();
            }, 5000);
        }

        setInterval(createFloatingIcon, 250); // Biraz daha sık gelsinler

        function surprizYap() {
            alert("Ayşenur! Bugün de tarzınla, enerjinle olay yaratıyorsun! Seni çok seviyorum aşko! 💖👑✨");
        }
    </script>
</body>
</html>
